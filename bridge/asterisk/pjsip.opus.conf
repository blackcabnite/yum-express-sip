; PJSIP config — OPUS WIDEBAND variant for sweetspot-voice
; Identical to pjsip.conf, but adds the [opus_wb] acceptor so Asterisk
; negotiates Opus at 48 kHz fullband with WhatsApp instead of the default
; narrowband (~8 kHz). Pair with codecs.opus.conf for the global encoder
; settings (complexity=10, fullband, FEC on, 32 kbps).
;
; Switch with: bridge/asterisk/switch-codec.sh opus
; Revert with: bridge/asterisk/switch-codec.sh g722

[global]
type=global
user_agent=SweetSpot-Voice
endpoint_identifier_order=header,username,ip

; ─── TRANSPORT (WhatsApp Business Calling uses SIP/TLS on 5061) ─────────────
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/letsencrypt/live/sweetspot.imtech.app/fullchain.pem
priv_key_file=/etc/letsencrypt/live/sweetspot.imtech.app/privkey.pem
method=sslv23
external_media_address=161.35.166.115
external_signaling_address=161.35.166.115
local_net=0.0.0.0/0
verify_client=no

; ─── OPUS WIDEBAND ACCEPTOR ────────────────────────────────────────────────
; Forces 48 kHz Opus in the SDP offer/answer. Without this, Asterisk
; negotiates Opus at default narrowband and audio sounds like G.722.
[opus_wb]
type=acceptor
codec=opus
attributes=maxplaybackrate=48000;sprop-maxcapturerate=48000;maxaveragebitrate=32000;useinbandfec=1;usedtx=0;stereo=0;cbr=0

; ─── WHATSAPP INBOUND ENDPOINT ──────────────────────────────────────────────
[whatsapp]
type=endpoint
context=whatsapp-inbound
disallow=all
allow=opus,alaw,ulaw
transport=transport-tls
aors=whatsapp-aor
direct_media=no
rewrite_contact=no
rtp_symmetric=no
force_rport=yes
media_encryption=sdes
media_encryption_optimistic=yes
rtcp_mux=yes
use_avpf=yes
trust_id_inbound=yes
send_connected_line=no
identify_by=header,username,ip
rtp_timeout=30
rtp_timeout_hold=60
rtp_keepalive=1

[whatsapp-aor]
type=aor
contact=sip:wa.meta.vc:5061

[whatsapp-identify]
type=identify
endpoint=whatsapp
match_header=X-FB-External-Domain: wa.meta.vc

[whatsapp-identify-ip]
type=identify
endpoint=whatsapp
match=157.240.0.0/16
match=31.13.0.0/16
match=173.252.0.0/16
match=179.60.0.0/16
match=185.60.216.0/22