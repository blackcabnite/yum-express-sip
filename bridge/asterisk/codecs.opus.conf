; codecs.conf — Opus tuning for fullband (48 kHz) WhatsApp audio.
; Used together with pjsip.opus.conf. Switch via switch-codec.sh.
;
; Deploy target: /etc/asterisk/codecs.conf

[general]

[opus]
type = opus
complexity = 10
signal = voice
sample_rate = 48000
max_playback_rate = 48000
max_bandwidth = fullband
fec = yes
dtx = no
stereo = no
cbr = no
bitrate = 32000