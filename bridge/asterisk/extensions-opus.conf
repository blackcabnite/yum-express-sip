; Dialplan snippet for routing WhatsApp inbound to the local Opus AI gateway
; INSTEAD of the Stasis G.722 bridge.  Use this context on the [whatsapp]
; endpoint while testing, then revert to [whatsapp-inbound] for prod.

[whatsapp-inbound-opus]
exten => _+X.,1,NoOp(WhatsApp Opus AI call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Dial(PJSIP/ai-opus/sip:${EXTEN}@127.0.0.1:5070,300)
 same => n,Hangup()

exten => _X.,1,NoOp(WhatsApp Opus AI call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Dial(PJSIP/ai-opus/sip:${EXTEN}@127.0.0.1:5070,300)
 same => n,Hangup()

exten => s,1,NoOp(WhatsApp Opus AI call no-ext)
 same => n,Answer()
 same => n,Dial(PJSIP/ai-opus/sip:s@127.0.0.1:5070,300)
 same => n,Hangup()

[ai-opus-out]
; Nothing to do here — gateway handles the call.
exten => _X.,1,NoOp(ai-opus leg)
 same => n,Hangup()