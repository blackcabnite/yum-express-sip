[general]

; ─── Opus encoder tuning — FULLBAND 48 kHz, FEC on ──────────────────────────
; Without this, Asterisk's Opus encoder runs at conservative defaults
; (often narrowband ~12 kHz, ~12 kbps, no FEC) which makes caller-side
; audio sound muddy. These settings match the known-good production
; sweetspot bridge and give WhatsApp callers wideband Opus on the leg
; the caller actually hears.
;
; Deploy this file to /etc/asterisk/codecs.conf, then on the VPS:
;   asterisk -rx "module reload codec_opus.so"
;   asterisk -rx "module reload res_pjsip.so"

[opus]
type = opus
complexity = 10
signal = voice
sample_rate = 48000
max_playback_rate = 48000
max_bandwidth = fullband
fec = yes
dtx = no
stereo = no
cbr = no
bitrate = 32000
