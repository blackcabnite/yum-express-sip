[general]

; ─── OPUS FULLBAND ENCODER ──────────────────────────────────────────────────
; Pairs with [opus_wb] acceptor in pjsip.conf. Encodes outbound audio at
; 48 kHz fullband for true wideband voice quality (vs G.722's ~7 kHz).
[opus]
type = opus
complexity = 10
signal = voice
sample_rate = 48000
max_playback_rate = 48000
max_bandwidth = fullband
fec = yes
dtx = no
stereo = no
cbr = no
bitrate = 32000
packet_loss = 1
application = voip
