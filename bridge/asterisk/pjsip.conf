[global]
type=global
user_agent=247-AI-Gateway
endpoint_identifier_order=header,username,ip

; --- TRANSPORTS ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=206.189.123.28
external_signaling_address=206.189.123.28
local_net=0.0.0.0/0

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/letsencrypt/live/sip.imtech.app/fullchain.pem
priv_key_file=/etc/letsencrypt/live/sip.imtech.app/privkey.pem
method=sslv23
external_media_address=206.189.123.28
external_signaling_address=206.189.123.28
local_net=0.0.0.0/0
verify_client=no

; --- WebSocket (WSS) transport for browser WebRTC ---
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/letsencrypt/live/sip.imtech.app/fullchain.pem
priv_key_file=/etc/letsencrypt/live/sip.imtech.app/privkey.pem
external_media_address=206.189.123.28
external_signaling_address=206.189.123.28
local_net=0.0.0.0/0

; --- WHATSAPP INBOUND ---
[whatsapp-in]
type=endpoint
context=from-whatsapp
disallow=all
allow=opus,alaw,ulaw
transport=transport-tls
aors=whatsapp-aor
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
media_encryption=sdes
media_encryption_optimistic=yes
rtcp_mux=yes
use_avpf=yes
ice_support=yes
trust_id_inbound=yes
send_connected_line=no
identify_by=header,username,ip
rtp_timeout=30
rtp_timeout_hold=60
rtp_keepalive=1

[whatsapp-identify]
type=identify
endpoint=whatsapp-in
match_header=X-FB-External-Domain: wa.meta.vc

[whatsapp-identify-ip]
type=identify
endpoint=whatsapp-in
match=157.240.0.0/16
match=31.13.0.0/16
match=173.252.0.0/16
match=179.60.0.0/16
match=185.60.216.0/22

[whatsapp-aor]
type=aor
contact=sip:wa.meta.vc:5061

