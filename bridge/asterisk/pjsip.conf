; --- GAMMA AI TRUNK (217202) ---
[gamma-identify]
type=identify
endpoint=gamma-trunk
match=78.110.160.0/24
match=s1.csuc.cloud

[gamma-trunk]
type=endpoint
context=from-internal
disallow=all
allow=alaw,ulaw
outbound_auth=gamma-auth
aors=gamma-aor
transport=transport-udp
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
from_user=217202
from_domain=s1.csuc.cloud
send_rpid=yes
send_pai=yes
trust_id_outbound=yes
rtp_timeout=30
rtp_timeout_hold=60
rtp_keepalive=1

[gamma-auth]
type=auth
auth_type=userpass
username=217202
password=247AiAgent%%

[gamma-aor]
type=aor
contact=sip:s1.csuc.cloud:5060

[gamma-reg]
type=registration
transport=transport-udp
outbound_auth=gamma-auth
server_uri=sip:s1.csuc.cloud:5060
client_uri=sip:217202@s1.csuc.cloud:5060
retry_interval=60
expiration=3600
