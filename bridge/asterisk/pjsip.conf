; PJSIP config for sweetspot-voice (161.35.166.115)
; Adapted from the working WhatsApp endpoint on sip.imtech.app.
; The WhatsApp-specific settings here are IDENTICAL to the working
; production config — only IP and cert paths changed.

[global]
type=global
user_agent=SweetSpot-Voice
endpoint_identifier_order=header,username,ip

; ─── TRANSPORT (WhatsApp Business Calling uses SIP/TLS on 5061) ─────────────
; external_media_address tells Asterisk what IP to advertise in SDP c= line.
; Without this, Meta receives an SDP pointing at an address it can't reach,
; and RTP never flows — which is exactly what we saw earlier (0 RX / 0 TX).
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/letsencrypt/live/sweetspot.imtech.app/fullchain.pem
priv_key_file=/etc/letsencrypt/live/sweetspot.imtech.app/privkey.pem
method=sslv23
external_media_address=161.35.166.115
external_signaling_address=161.35.166.115
local_net=0.0.0.0/0
verify_client=no

; ─── WHATSAPP INBOUND ENDPOINT ──────────────────────────────────────────────
; SIP/TLS + SDES-SRTP. NO ICE — that's for WebRTC clients only.
; Settings copied verbatim from working [whatsapp-in] on sip.imtech.app.
[whatsapp]
type=endpoint
context=whatsapp-inbound
disallow=all
; Prefer G.711 first so a stock Debian/Ubuntu Asterisk can negotiate even when
; codec_opus is not installed. Keep opus last for hosts that do have it.
allow=ulaw
allow=alaw
allow=opus
transport=transport-tls
aors=whatsapp-aor
direct_media=no
rewrite_contact=no
rtp_symmetric=yes
force_rport=yes
media_encryption=sdes
media_encryption_optimistic=yes
rtcp_mux=yes
use_avpf=no
force_avp=no
media_use_received_transport=yes
trust_id_inbound=yes
send_connected_line=no
identify_by=header,username,ip
rtp_timeout=30
rtp_timeout_hold=60
rtp_keepalive=1

[whatsapp-aor]
type=aor
contact=sip:wa.meta.vc:5061

; Identify by the X-FB-External-Domain header Meta sends
[whatsapp-identify]
type=identify
endpoint=whatsapp
match_header=X-FB-External-Domain: wa.meta.vc

; Identify by source IP — using the WIDE Meta ranges from the working config
[whatsapp-identify-ip]
type=identify
endpoint=whatsapp
match=157.240.0.0/16
match=31.13.0.0/16
match=173.252.0.0/16
match=179.60.0.0/16
match=185.60.216.0/22
