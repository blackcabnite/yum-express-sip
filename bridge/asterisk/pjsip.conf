[global]
type=global
user_agent=SweetSpot-Voice
endpoint_identifier_order=ip,header,username

; --- TRANSPORT (WhatsApp Business Calling uses SIP/TLS on 5061) ---
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/letsencrypt/live/sweetspot.imtech.app/fullchain.pem
priv_key_file=/etc/letsencrypt/live/sweetspot.imtech.app/privkey.pem
method=sslv23
external_media_address=161.35.166.115
external_signaling_address=161.35.166.115
local_net=0.0.0.0/0
verify_client=no

; --- WHATSAPP INBOUND ENDPOINT ---
; WhatsApp Business Calling uses SIP/TLS + SDES-SRTP (NOT WebRTC/DTLS).
; Do NOT set webrtc=yes here — it forces media_encryption=dtls and
; WhatsApp will drop the media before any RTP flows. Enable ICE / AVPF /
; rtcp_mux explicitly instead.
[whatsapp]
type=endpoint
context=whatsapp-inbound
disallow=all
allow=opus,alaw,ulaw
transport=transport-tls
aors=whatsapp-aor
ice_support=yes
use_avpf=yes
rtcp_mux=yes
media_encryption=sdes
media_encryption_optimistic=yes
direct_media=no
rewrite_contact=no
rtp_symmetric=no
force_rport=yes
trust_id_inbound=yes
send_connected_line=no
identify_by=header,username,ip
rtp_timeout=30
rtp_timeout_hold=60
rtp_keepalive=1

[whatsapp-aor]
type=aor
contact=sip:wa.meta.vc:5061

[whatsapp-identify]
type=identify
endpoint=whatsapp
match_header=X-FB-External-Domain: wa.meta.vc

[whatsapp-identify-ip]
type=identify
endpoint=whatsapp
match=157.240.0.0/16
match=31.13.0.0/16
match=173.252.0.0/16
match=179.60.0.0/16
match=185.60.216.0/22