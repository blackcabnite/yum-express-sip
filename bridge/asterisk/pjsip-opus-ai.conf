; ─── Local Opus AI endpoint ────────────────────────────────────────────────
; Append-only. Drop into /etc/asterisk/pjsip.conf (or include via
; #include "pjsip-opus-ai.conf").  Asterisk will Dial(PJSIP/ai-opus/...) into
; the Node opus-gateway running on 127.0.0.1:5070.

[transport-udp-local]
type=transport
protocol=udp
bind=127.0.0.1:5060

[ai-opus]
type=endpoint
transport=transport-udp-local
context=ai-opus-out
disallow=all
allow=opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
aors=ai-opus
; Opus fmtp injected via [opus_wb] acceptor in main pjsip.conf

[ai-opus]
type=aor
contact=sip:ai-opus@127.0.0.1:5070
qualify_frequency=30